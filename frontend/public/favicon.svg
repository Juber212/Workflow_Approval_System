<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- 六边形底板 -->
  <path d="M24 5L39 14L39 34L24 43L9 34L9 14Z"
        fill="#1a6fb5" stroke-linejoin="round"/>
  <!-- 内圈亮色弧线（增加层次感） -->
  <path d="M17 18C20 24 28 18 31 26"
        stroke="#ecf5ff" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.4"/>
  <!-- 主流动曲线（白色S弧） -->
  <path d="M13 22C20 14 29 30 36 20"
        stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- 起点节点 -->
  <circle cx="13" cy="22" r="2.5" fill="#a8d4ff"/>
  <!-- 终点节点 -->
  <circle cx="36" cy="20" r="2.5" fill="white"/>
</svg>
