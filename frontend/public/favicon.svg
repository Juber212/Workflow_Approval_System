<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <g stroke="#111" stroke-width="2.2" stroke-linejoin="round" fill="none">
    <!-- 顶面六边形 -->
    <path d="M24 6l14 8-7 12-14 0-7-12z"/>
    <!-- 可见垂直边 -->
    <line x1="38" y1="14" x2="38" y2="28"/>
    <line x1="31" y1="26" x2="31" y2="40"/>
    <line x1="17" y1="26" x2="17" y2="40"/>
    <!-- 底面可见边 -->
    <path d="M38 28l-7 12-14 0"/>
    <!-- 被遮挡的垂直边（虚线） -->
    <line x1="10" y1="14" x2="10" y2="28" stroke-dasharray="3 3" opacity="0.3"/>
  </g>

  <!-- 流动折线 -->
  <path d="M14 20l8-4 5 8 9-6"
        stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="14" cy="20" r="2.5" fill="#111"/>
  <circle cx="36" cy="18" r="2.5" fill="#111"/>
</svg>
